name: Build Binaries

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set Up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Build Binary
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
      run: |
        EXTENSION=""
        if [ "$GOOS" = "windows" ]; then
          EXTENSION=".exe"
        fi
        OUTPUT_NAME="ssh-mcp-${GOOS}-${GOARCH}${EXTENSION}"
        go build -ldflags="-s -w -X main.commitSHA=${{ github.sha }}" -o "dist/${OUTPUT_NAME}" ./cmd/server
        echo "Built: dist/${OUTPUT_NAME}"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ssh-mcp-${{ matrix.goos }}-${{ matrix.goarch }}
        path: dist/ssh-mcp-*
        retention-days: 30
